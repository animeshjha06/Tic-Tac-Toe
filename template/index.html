<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="icon" href="/static/images/tic-tac-toe.png" type="image/png">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js"></script>
</head>
<body>
    <header>Tic Tac Toe</header>
    <section>
        <div>
            Play a game
            <table class = "board">
                <tr>
                    <td id = '1'>1</td>
                    <td id = '2'>2</td>
                    <td id = '3'>3</td>
                </tr>
                <tr>
                    <td id = '4'>4</td>
                    <td id = '5'>5</td>
                    <td id = '6'>6</td>
                </tr>
                <tr>
                    <td id = '7'>7</td>
                    <td id = '8'>8</td>
                    <td id = '9'>9</td>
                </tr>
            </table>
        </div>
    </section>
</body>
</html>
