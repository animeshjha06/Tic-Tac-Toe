<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="icon" href="/static/images/tic-tac-toe.png" type="image/png">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js"></script>
</head>
<body>
    <div class="game">
        <div  class="score_logo">
            <div class="legend">
                <img class="logo" src="/static/images/cross.png" alt="">
                <img class="logo" src="/static/images/circle.png" alt="">
            </div>
            <div class="turn_indicator">
                <span class="">
                    <img class="turn_sign" src="/static/images/cross.png" alt="">
                </span>
                <span class="turn">TURN</span>
            </div>
            <button class="reset_button">⟳</button>
        </div>

        <div class="board"> 
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
        </div>

        <div class="scoreboard">
            <div class="scorecard_x">
                <div>Player 1</div>
                <div>0</div>
            </div>
            <div class="scorecard_tie">
                <div>Ties</div>
                <div>0</div>
            </div>
            <div class="scorecard_o">
                <div>Player 2</div>
                <div>0</div>
            </div>
        </div>
    </div>
</body>
</html>
