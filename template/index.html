<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="icon" href="/static/images/tic-tac-toe.png" type="image/png">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js"></script>
</head>
<body>
    <div class="game">
        <div  class="score_logo">
            <div>
                <img class="logo" src="/static/images/cross.png" alt="">
                <img class="logo" src="/static/images/circle.png" alt="">
            </div>
            <div>
                <span>*</span>
                <span>Turn</span>
            </div>
            <button></button>
        </div>

        <div class="board"> 
            <div class="row">
                <div class="cell">1</div>
                <div class="cell">2</div>
                <div class="cell">3</div>
            </div>
            <div class="row">
                <div class="cell">4</div>
                <div class="cell">5</div>
                <div class="cell">6</div>
            </div>
            <div class="row">
                <div class="cell">7</div>
                <div class="cell">8</div>
                <div class="cell">9</div>
            </div>
        </div>

        <div class="scoreboard">
            <div>
                <div>Player 1</div>
                <div>0</div>
            </div>
            <div>
                <div>Ties</div>
                <div>0</div>
            </div>
            <div>
                <div>Player 2</div>
                <div>Ties</div>
            </div>
        </div>
    </div>
</body>
</html>
